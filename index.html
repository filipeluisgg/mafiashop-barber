<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- FONTE -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Hammersmith+One&display=swap" rel="stylesheet" />

    <!-- ICONES (FONTAWESOME) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

    <!-- LINK PARA CSS -->
    <link rel="stylesheet" href="style.css" />

    <title>MafiaShop Barbearia</title>
</head>


<body>
    <!-- HEADER -->
    <header class="header">
        <img class="header-logo" src="assets/logo-mafiashop-barbearia-minificado.jpg" alt="Logo da MafiaShop Barbearia">

        <div class="header-icons">
            <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram fa-2x"></i></a>
            <a href="#" aria-label="Threads"><i class="fa-brands fa-threads fa-2x"></i></a>
            <a href="#" aria-label="TikTok"><i class="fa-brands fa-tiktok fa-2x"></i></a>
        </div>
    </header>


<!-- HERO -->
    <div class="bg-home">
        <main class="hero container">
            <h1>
                FAZEMOS SUA BARBA DE MANEIRA CLÁSSICA: <br />
                COM NAVALHA E TOALHA QUENTE
            </h1>

            <a href="#" class="button-contact" target="_blank">
                <i class="fa-brands fa-whatsapp fa-2x"></i>
                <span>Agendar horário</span>
            </a>
        </main>
    </div>


<!-- APRESENTAÇÃO COM FOTOS DOS CORTES (PRESENTATION) -->
    <section class="presentation container">
        <h2 class="presentation-title">Conheça nosso trabalho:</h2>
    
        <div class="presentation-gallery">
            <img src="assets/gallery/corte-degrade.webp" alt="Corte degradê masculino com acabamento na navalha" loading="lazy" width="280" height="350">
            <img src="assets/gallery/barba-lenhador.webp" alt="Barba longa estilo lenhador alinhada com toalha quente" loading="lazy" width="280" height="350">
            <img src="assets/gallery/corte-infantil.webp" alt="Corte de cabelo infantil social" loading="lazy" width="280" height="350">
        </div>
    </section>


</body>



</html>
